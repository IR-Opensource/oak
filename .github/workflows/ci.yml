name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use stable Deno (NOT canary → avoids Oak test breakages)
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      # IMPORTANT: Oak tests require full permissions (-A)
      - name: Run tests with coverage
        run: deno test -A --coverage=coverage

      - name: Generate LCOV report
        run: deno coverage coverage --lcov > cov.lcov

      # Upload coverage (optional but safe)
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./cov.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
