name: ci

on:
  workflow_dispatch:

jobs:
  oak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: canary

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Test with coverage
        run: deno test --coverage=coverage

      - name: Generate lcov
        run: deno coverage coverage --lcov > cov.lcov

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./cov.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
